<!DOCTYPE html>
<html>
<head>
    <title>QGIS Server Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map { height: 100%; width: 100%; margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Start the map over Indiana, PA
        var map = L.map('map').setView([40.6435, -79.1294], 11);

        // Add a standard street map background so we can see where we are
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Ask YOUR local QGIS Docker server for the WMS parcels
        var qgisWMS = L.tileLayer.wms("http://localhost:9090/ows/", {
            layers: 'INDCO_c25527e7_d1da_4237_807c_58698b4cff7d',             // The short name we set earlier
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            crs: L.CRS.EPSG3857
        }).addTo(map);
    </script>
</body>
</html>
